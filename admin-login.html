<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Login | SportsMistakes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#07111f;color:#fff}
    .box{max-width:460px;margin:90px auto;background:#0d1b2e;border:1px solid #203852;border-radius:16px;padding:24px}
    h1{margin-top:0}
    label{display:block;margin-top:14px;color:#d8e4f2;font-weight:bold}
    input{width:100%;box-sizing:border-box;margin-top:8px;padding:12px;border-radius:8px;border:1px solid #203852;background:#07111f;color:white;font-size:15px}
    button{margin-top:18px;background:#1e90ff;color:white;border:none;border-radius:8px;padding:12px 15px;font-weight:bold;cursor:pointer}
    .msg{margin-top:14px;color:#ffcc00;white-space:pre-wrap}
    a{color:#74b9ff}
  </style>
</head>
<body>
  <div class="box">
    <h1>SportsMistakes Admin Login</h1>
    <p>Sign in with the admin email/password you create in Supabase Auth.</p>

    <label>Email</label>
    <input id="email" type="email" value="jason.susnick@gmail.com" />

    <label>Password</label>
    <input id="password" type="password" placeholder="Admin password" />

    <button onclick="login()">Log In</button>
    <button onclick="logout()" style="background:#444;">Log Out</button>

    <div id="msg" class="msg"></div>
    <p><a href="index.html">Back to SportsMistakes</a></p>
  </div>

<script>
const SUPABASE_URL="https://scwjlljurircxuufhqih.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjd2psbGp1cmlyY3h1dWZocWloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjUyMjcsImV4cCI6MjA5Njg0MTIyN30.WF0HRRb9mAkuOySjabTd8CZXVZRqF0MhMl0N2mafnns";
const client=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

function getRedirectTarget(){
  const params=new URLSearchParams(window.location.search);
  return params.get("redirect") || "admin-submissions.html";
}

async function login(){
  const msg=document.getElementById("msg");
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value;

  msg.innerText="Logging in...";

  const {data,error}=await client.auth.signInWithPassword({email,password});

  if(error){
    console.error(error);
    msg.innerText="Login failed: "+error.message;
    return;
  }

  msg.innerText="Login successful. Redirecting...";
  window.location.href=getRedirectTarget();
}

async function logout(){
  await client.auth.signOut();
  document.getElementById("msg").innerText="Logged out.";
}
</script>
</body>
</html>
