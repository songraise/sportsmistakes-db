<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rankings | SportsMistakes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --page-bg: #07111f;
      --surface: #ffffff;
      --surface-soft: #f7f9fc;
      --border: #d8e0ea;
      --text: #111827;
      --muted: #5f6f82;
      --blue: #1e90ff;
      --blue-dark: #0d3b66;
      --gold: #ffcc00;
      --gold-dark: #b58100;
      --nav-bg: #0d1b2e;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--page-bg);
      color: #ffffff;
    }

    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--nav-bg);
      border-bottom: 1px solid #203852;
      padding: 14px 20px;
    }

    .nav-brand {
      font-weight: bold;
      font-size: 20px;
      color: #ffffff;
      cursor: pointer;
    }

    .nav-brand span {
      color: var(--gold);
    }

    .nav-links a {
      color: #74b9ff;
      text-decoration: none;
      font-weight: bold;
      margin-left: 18px;
    }

    .nav-links a:hover {
      color: var(--gold);
    }

    .container {
      max-width: 1050px;
      margin: 35px auto 60px;
      padding: 0 20px;
    }

    .hero-card {
      background: rgba(5, 15, 28, .86);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 18px;
      padding: 26px;
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      color: #ffffff;
      font-size: 36px;
    }

    .sub {
      color: #d8e8ff;
      margin-bottom: 0;
      line-height: 1.5;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 22px 0;
    }

    button {
      padding: 11px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #203852;
      color: white;
      font-weight: bold;
    }

    button:hover {
      background: #2e4a6d;
    }

    button.active {
      background: var(--blue);
    }

    .message {
      color: #d8e8ff;
      margin: 18px 0;
      font-weight: bold;
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .row {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(0,0,0,.16);
    }

    .row:hover {
      border-color: var(--blue);
      box-shadow: 0 10px 26px rgba(0,0,0,.22);
    }

    .rank {
      color: var(--gold-dark);
      font-weight: bold;
      font-size: 18px;
      margin-right: 8px;
    }

    .score {
      float: right;
      background: var(--gold);
      color: #111;
      padding: 5px 8px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 12px;
    }

    h2 {
      margin: 8px 0;
      font-size: 20px;
      color: var(--text);
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .summary {
      color: #344256;
      line-height: 1.45;
    }

    @media(max-width:760px) {
      h1 { font-size: 30px; }
      .nav-links a { margin-left: 10px; font-size: 14px; }
      .score { float: none; display: inline-block; margin-top: 8px; }
    }
  </style>
</head>

<body>

<nav class="top-nav">
  <div class="nav-brand" onclick="window.location.href='index.html'">Sports<span>Mistakes</span></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="rankings.html">Rankings</a>
    <a href="collections.html">Collections</a>
    <a href="hall-of-fame.html">Hall of Fame</a>
    <a href="submit.html">Submit</a>
  </div>
</nav>

<div class="container">
  <div class="hero-card">
    <h1>SportsMistakes Rankings</h1>
    <div class="sub">Browse the most controversial mistakes by sport and category.</div>
  </div>

  <div class="tabs">
    <button class="active" onclick="setRanking('all', this)">Top Overall</button>
    <button onclick="setRanking('NFL', this)">Top NFL</button>
    <button onclick="setRanking('NHL', this)">Top NHL</button>
    <button onclick="setRanking('NBA', this)">Top NBA</button>
    <button onclick="setRanking('MLB', this)">Top MLB</button>
    <button onclick="setRanking('Soccer', this)">Top Soccer</button>
    <button onclick="setRanking('Coaching Mistake', this)">Coaching</button>
    <button onclick="setRanking('Referee Mistake', this)">Referee</button>
    <button onclick="setRanking('Player Mistake', this)">Player</button>
    <button onclick="setRanking('Front Office Mistake', this)">Front Office</button>
  </div>

  <div id="message" class="message">Loading rankings...</div>
  <div id="rankingsList" class="list"></div>
</div>

<script>
  const SUPABASE_URL = "https://scwjlljurircxuufhqih.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjd2psbGp1cmlyY3h1dWZocWloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjUyMjcsImV4cCI6MjA5Njg0MTIyN30.WF0HRRb9mAkuOySjabTd8CZXVZRqF0MhMl0N2mafnns";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let mistakes = [];
  let currentRanking = "all";

  async function loadMistakes() {
    const { data, error } = await client
      .from("mistakes")
      .select("*")
      .order("controversy_score", { ascending: false });

    if (error) {
      console.error(error);
      document.getElementById("message").innerText = "Could not load rankings.";
      return;
    }

    mistakes = data || [];
    renderRankings();
  }

  function setRanking(type, button) {
    currentRanking = type;

    document.querySelectorAll(".tabs button").forEach(btn => btn.classList.remove("active"));
    button.classList.add("active");

    renderRankings();
  }

  function renderRankings() {
    const list = document.getElementById("rankingsList");
    const message = document.getElementById("message");

    let filtered = mistakes;

    if (currentRanking !== "all") {
      filtered = mistakes.filter(m =>
        m.sport === currentRanking || m.category === currentRanking
      );
    }

    filtered = filtered
      .sort((a, b) => (b.controversy_score || 0) - (a.controversy_score || 0))
      .slice(0, 100);

    if (filtered.length === 0) {
      message.innerText = "No mistakes found for this ranking.";
      list.innerHTML = "";
      return;
    }

    message.innerText = `${filtered.length} ranked mistake${filtered.length === 1 ? "" : "s"}`;

    list.innerHTML = filtered.map((m, index) => `
      <div class="row" onclick="window.location.href='mistake.html?id=${m.id}'">
        <span class="rank">#${index + 1}</span>
        <span class="score">${escapeHtml(m.controversy_score || 0)}/100</span>

        <h2>${escapeHtml(m.title || "Untitled Mistake")}</h2>

        <div class="meta">
          ${escapeHtml(m.sport || "")}
          ${m.year ? " • " + escapeHtml(m.year) : ""}
          ${m.category ? " • " + escapeHtml(m.category) : ""}
          ${m.subcategory ? " • " + escapeHtml(m.subcategory) : ""}
        </div>

        <div class="summary">
          ${escapeHtml(m.summary || "No summary added yet.")}
        </div>
      </div>
    `).join("");
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  loadMistakes();
</script>

</body>
</html>
