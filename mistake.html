<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SportsMistakes | Mistake Detail</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07111f;
      color: #fff;
    }

    header {
      padding: 28px 20px;
      background: #0d1b2e;
      border-bottom: 1px solid #203852;
    }

    header a {
      color: #74b9ff;
      text-decoration: none;
      font-weight: bold;
      margin-right: 16px;
    }

    .container {
      max-width: 850px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      background: #0d1b2e;
      border: 1px solid #203852;
      border-radius: 16px;
      padding: 26px;
    }

    .badge {
      display: inline-block;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #1e90ff;
      margin-bottom: 14px;
    }

    .score {
      float: right;
      background: #ffcc00;
      color: #111;
      padding: 6px 10px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 13px;
    }

    h1 {
      font-size: 34px;
      margin: 10px 0;
    }

    .meta {
      color: #9fb2c7;
      margin-bottom: 22px;
      font-size: 15px;
    }

    .section {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #203852;
    }

    .section h2 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    p {
      color: #d8e4f2;
      line-height: 1.6;
      font-size: 16px;
    }

    .vote-buttons {
      margin-top: 15px;
    }

    .vote-buttons button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    .yes-btn {
      background: #1e90ff;
    }

    .no-btn {
      background: #444;
    }

    #voteResults {
      margin-top: 18px;
      color: #d8e4f2;
      font-size: 16px;
    }

    .sources a {
      display: inline-block;
      color: #74b9ff;
      text-decoration: none;
      margin-right: 16px;
      margin-top: 8px;
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
      margin-top: 14px;
    }

    .related-card {
      background: #07111f;
      border: 1px solid #203852;
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
    }

    .related-card:hover {
      border-color: #1e90ff;
    }

    .related-card h3 {
      font-size: 16px;
      margin: 6px 0;
    }

    .related-meta {
      font-size: 13px;
      color: #9fb2c7;
    }

    .related-score {
      display: inline-block;
      background: #ffcc00;
      color: #111;
      padding: 4px 7px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 12px;
      margin-top: 8px;
    }

    .loading, .error {
      text-align: center;
      color: #b9c8da;
      padding: 40px;
    }
  </style>
</head>

<body>

<header>
  <a href="index.html">Home</a>
  <a href="rankings.html">Rankings</a>
  <a href="submit.html">Submit Mistake</a>
</header>

<div class="container">
  <div id="content" class="loading">Loading mistake...</div>
</div>

<script>
  const SUPABASE_URL = "https://scwjlljurircxuufhqih.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjd2psbGp1cmlyY3h1dWZocWloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjUyMjcsImV4cCI6MjA5Njg0MTIyN30.WF0HRRb9mAkuOySjabTd8CZXVZRqF0MhMl0N2mafnns";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  let currentMistake = null;

  async function loadMistake() {
    const content = document.getElementById("content");

    if (!id) {
      content.innerHTML = `<div class="error">No mistake ID provided.</div>`;
      return;
    }

    const { data, error } = await client
      .from("mistakes")
      .select("*")
      .eq("id", id)
      .single();

    if (error || !data) {
      console.error(error);
      content.innerHTML = `<div class="error">Mistake not found.</div>`;
      return;
    }

    currentMistake = data;

    content.className = "card";
    content.innerHTML = `
      <span class="badge">${escapeHtml(data.sport || "Sport")}</span>
      <span class="score">${escapeHtml(data.controversy_score || 0)}/100</span>

      <h1>${escapeHtml(data.title || "Untitled Mistake")}</h1>

      <div class="meta">
        ${escapeHtml(data.year || "")}
        ${data.category ? " • " + escapeHtml(data.category) : ""}
        ${data.subcategory ? " • " + escapeHtml(data.subcategory) : ""}
      </div>

      ${data.teams_people ? `
        <div class="section">
          <h2>Teams / People</h2>
          <p>${escapeHtml(data.teams_people)}</p>
        </div>
      ` : ""}

      <div class="section">
        <h2>What Happened</h2>
        <p>${escapeHtml(data.summary || "No summary added yet.")}</p>
      </div>

      ${data.why_it_matters ? `
        <div class="section">
          <h2>Why It Matters</h2>
          <p>${escapeHtml(data.why_it_matters)}</p>
        </div>
      ` : ""}

      <div class="section">
        <h2>Fan Verdict</h2>
        <p>Was this actually a mistake?</p>

        <div class="vote-buttons">
          <button class="yes-btn" onclick="submitVote('yes')">YES — Mistake</button>
          <button class="no-btn" onclick="submitVote('no')">NO — Not a Mistake</button>
        </div>

        <div id="voteResults">
          Loading votes...
        </div>
      </div>

      <div class="section sources">
        <h2>Sources</h2>
        ${data.source_1 ? `<a href="${escapeHtml(data.source_1)}" target="_blank">Source 1</a>` : ""}
        ${data.source_2 ? `<a href="${escapeHtml(data.source_2)}" target="_blank">Source 2</a>` : ""}
      </div>

      <div class="section">
        <h2>Related Mistakes</h2>
        <div id="relatedMistakes">Loading related mistakes...</div>
      </div>
    `;

    await loadVotes();
    await loadRelatedMistakes();
  }

  async function loadVotes() {
    const voteResults = document.getElementById("voteResults");
    if (!voteResults || !id) return;

    const { data, error } = await client
      .from("mistake_votes")
      .select("vote")
      .eq("mistake_id", id);

    if (error) {
      voteResults.innerText = "Could not load votes.";
      console.error(error);
      return;
    }

    const votes = data || [];
    const total = votes.length;
    const yes = votes.filter(v => v.vote === "yes").length;
    const no = votes.filter(v => v.vote === "no").length;

    if (total === 0) {
      voteResults.innerHTML = "No votes yet. Be the first to vote.";
      return;
    }

    const yesPercent = Math.round((yes / total) * 100);
    const noPercent = Math.round((no / total) * 100);

    voteResults.innerHTML = `
      <strong>${yesPercent}% YES</strong> / ${noPercent}% NO<br>
      ${total} total vote${total === 1 ? "" : "s"}
    `;
  }

  async function submitVote(vote) {
    const voteKey = "sportsmistakes_vote_" + id;

    if (localStorage.getItem(voteKey)) {
      alert("You already voted on this mistake.");
      return;
    }

    let voterId = localStorage.getItem("sportsmistakes_voter_id");

    if (!voterId) {
      voterId = crypto.randomUUID();
      localStorage.setItem("sportsmistakes_voter_id", voterId);
    }

    const { error } = await client
      .from("mistake_votes")
      .insert({
        mistake_id: id,
        vote: vote,
        voter_id: voterId
      });

    if (error) {
      alert("Vote failed. Please try again.");
      console.error(error);
      return;
    }

    localStorage.setItem(voteKey, vote);
    await loadVotes();
  }

  async function loadRelatedMistakes() {
    const relatedBox = document.getElementById("relatedMistakes");
    if (!relatedBox || !currentMistake) return;

    const { data, error } = await client
      .from("mistakes")
      .select("*")
      .neq("id", id)
      .or(`sport.eq.${currentMistake.sport},category.eq.${currentMistake.category},subcategory.eq.${currentMistake.subcategory}`)
      .order("controversy_score", { ascending: false })
      .limit(6);

    if (error) {
      console.error(error);
      relatedBox.innerHTML = "Could not load related mistakes.";
      return;
    }

    if (!data || data.length === 0) {
      relatedBox.innerHTML = "No related mistakes yet.";
      return;
    }

    relatedBox.innerHTML = `
      <div class="related-grid">
        ${data.map(m => `
          <div class="related-card" onclick="window.location.href='mistake.html?id=${m.id}'">
            <div class="related-meta">
              ${escapeHtml(m.sport || "")}
              ${m.year ? " • " + escapeHtml(m.year) : ""}
            </div>
            <h3>${escapeHtml(m.title || "Untitled Mistake")}</h3>
            <div class="related-meta">
              ${escapeHtml(m.category || "")}
            </div>
            <span class="related-score">${escapeHtml(m.controversy_score || 0)}/100</span>
          </div>
        `).join("")}
      </div>
    `;
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  loadMistake();
</script>

</body>
</html>
