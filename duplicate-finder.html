<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Duplicate Finder | SportsMistakes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#07111f; color:#fff; }
    .top-nav { display:flex; justify-content:space-between; align-items:center; background:#0d1b2e; border-bottom:1px solid #203852; padding:14px 20px; }
    .nav-brand { font-weight:bold; font-size:20px; cursor:pointer; }
    .nav-links a { color:#74b9ff; text-decoration:none; font-weight:bold; margin-left:18px; }
    .container { max-width:1150px; margin:35px auto; padding:0 20px; }
    .card { background:#0d1b2e; border:1px solid #203852; border-radius:16px; padding:20px; margin-bottom:18px; }
    .pair { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:14px; }
    .item { background:#07111f; border:1px solid #203852; border-radius:12px; padding:16px; }
    h1 { margin-bottom:6px; }
    h2 { margin:0 0 8px; font-size:20px; }
    .meta { color:#9fb2c7; margin-bottom:10px; }
    p { color:#d8e4f2; line-height:1.5; }
    button { padding:11px 15px; border:none; border-radius:8px; color:white; font-weight:bold; cursor:pointer; margin-right:8px; margin-top:10px; }
    .scan { background:#1e90ff; margin-top:18px; }
    .delete { background:#8b1e1e; }
    .open { background:#444; }
    .ignore { background:#6b5b1e; }
    .related { background:#166534; }
    .score { color:#ffcc00; font-weight:bold; }
    .message { color:#d8e4f2; margin:18px 0; white-space:pre-wrap; }
    .actions { margin-top:14px; padding-top:14px; border-top:1px solid #203852; }
    .explain { color:#b7c7d9; font-size:14px; line-height:1.45; margin-top:8px; }
    .filters { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
    .filters select { padding:10px; border-radius:8px; border:none; }
    @media(max-width:800px){ .pair{grid-template-columns:1fr;} }
  </style>
</head>

<body>

<nav class="top-nav">
  <div class="nav-brand" onclick="window.location.href='index.html'">SportsMistakes</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="rankings.html">Rankings</a>
    <a href="collections.html">Collections</a>
    <a href="submit.html">Submit</a>
  </div>
</nav>

<div class="container">
  <h1>Duplicate Finder</h1>
  <p>
    Review likely duplicate records. You can now choose:
    <strong>Delete</strong> for true duplicates,
    <strong>Mark Related</strong> for same-event/different-angle records,
    or <strong>Ignore</strong> for false positives.
  </p>

  <button id="scanButton" class="scan" disabled onclick="findDuplicates()">Scan for Duplicates</button>

  <div class="filters">
    <select id="minimumScore">
      <option value="0.38">Normal scan</option>
      <option value="0.50">Stricter scan</option>
      <option value="0.65">Very strict scan</option>
    </select>
  </div>

  <div id="message" class="message">Checking admin access...</div>
  <div id="results"></div>
</div>

<script>
  const SUPABASE_URL = "https://scwjlljurircxuufhqih.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjd2psbGp1cmlyY3h1dWZocWloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjUyMjcsImV4cCI6MjA5Njg0MTIyN30.WF0HRRb9mAkuOySjabTd8CZXVZRqF0MhMl0N2mafnns";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const SPORTS_MISTAKES_ADMIN_EMAIL = "jason.susnick@gmail.com";

  async function requireSportsMistakesAdminInline() {
    const { data, error } = await client.auth.getSession();
    const session = data && data.session;

    if (error) {
      console.error(error);
    }

    if (!session) {
      window.location.href = "admin-login.html?redirect=duplicate-finder.html";
      return false;
    }

    const email = (session.user && session.user.email ? session.user.email : "").toLowerCase();

    if (email !== SPORTS_MISTAKES_ADMIN_EMAIL.toLowerCase()) {
      document.body.innerHTML = `
        <div style="max-width:600px;margin:80px auto;background:#0d1b2e;color:white;border:1px solid #203852;border-radius:16px;padding:24px;font-family:Arial,sans-serif;">
          <h1>Admin Access Denied</h1>
          <p>You are signed in as <strong>${email || "unknown"}</strong>.</p>
          <p>This admin page is restricted.</p>
          <a href="admin-login.html" style="color:#74b9ff;">Log in as admin</a>
        </div>
      `;
      return false;
    }

    return true;
  }

  let mistakes = [];

  function normalizeText(text) {
    return String(text || "")
      .toLowerCase()
      .replace(/[^a-z0-9 ]/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function importantWords(text) {
    const stopWords = new Set([
      "the","a","an","and","or","of","to","in","on","for","vs","v",
      "game","mistake","error","incident","controversy","collapse",
      "disaster","blunder","goal","call","miss","missed","sports",
      "team","player","referee","coaching","front","office"
    ]);

    return normalizeText(text)
      .split(" ")
      .filter(w => w.length > 2 && !stopWords.has(w));
  }

  function similarity(a, b) {
    const wordsA = importantWords(a);
    const wordsB = importantWords(b);

    if (!wordsA.length || !wordsB.length) return 0;

    const setA = new Set(wordsA);
    const setB = new Set(wordsB);

    let matches = 0;
    setA.forEach(w => {
      if (setB.has(w)) matches++;
    });

    return matches / Math.max(setA.size, setB.size);
  }

  function combinedText(m) {
    return `
      ${m.title || ""}
      ${m.sport || ""}
      ${m.year || ""}
      ${m.category || ""}
      ${m.subcategory || ""}
      ${m.teams_people || ""}
      ${m.summary || ""}
      ${m.why_it_matters || ""}
    `;
  }

  function sortedPairKey(id1, id2) {
    return [id1, id2].sort().join("|");
  }

  async function findDuplicates() {
    const message = document.getElementById("message");
    const results = document.getElementById("results");
    const minScore = Number(document.getElementById("minimumScore").value || 0.38);

    message.innerText = "Loading mistakes, ignored pairs, and related pairs...";
    results.innerHTML = "";

    const [
      mistakesResult,
      ignoredResult,
      relatedResult
    ] = await Promise.all([
      client.from("mistakes").select("*").order("title", { ascending: true }),
      client.from("duplicate_ignores").select("mistake_id_1,mistake_id_2"),
      client.from("related_mistakes").select("mistake_id_1,mistake_id_2")
    ]);

    if (mistakesResult.error) {
      console.error(mistakesResult.error);
      message.innerText = "Could not load mistakes.";
      return;
    }

    if (ignoredResult.error) {
      console.error(ignoredResult.error);
      message.innerText = "Could not load ignored pairs. Did you run the duplicate_ignores SQL setup?";
      return;
    }

    if (relatedResult.error) {
      console.error(relatedResult.error);
      message.innerText = "Could not load related pairs. Did you run the related_mistakes SQL setup?";
      return;
    }

    mistakes = mistakesResult.data || [];

    const ignoredSet = new Set(
      (ignoredResult.data || []).map(p => sortedPairKey(p.mistake_id_1, p.mistake_id_2))
    );

    const relatedSet = new Set(
      (relatedResult.data || []).map(p => sortedPairKey(p.mistake_id_1, p.mistake_id_2))
    );

    message.innerText = "Scanning for likely duplicates...";

    const pairs = [];

    for (let i = 0; i < mistakes.length; i++) {
      for (let j = i + 1; j < mistakes.length; j++) {
        const a = mistakes[i];
        const b = mistakes[j];

        const pairKey = sortedPairKey(a.id, b.id);

        if (ignoredSet.has(pairKey)) continue;
        if (relatedSet.has(pairKey)) continue;

        const titleScore = similarity(a.title, b.title);
        const fullScore = similarity(combinedText(a), combinedText(b));

        const sameSport = a.sport && b.sport && a.sport === b.sport;
        const sameYear = a.year && b.year && Number(a.year) === Number(b.year);
        const sameCategory = a.category && b.category && a.category === b.category;

        const finalScore =
          (titleScore * 0.65) +
          (fullScore * 0.25) +
          (sameSport ? 0.04 : 0) +
          (sameYear ? 0.04 : 0) +
          (sameCategory ? 0.02 : 0);

        if (
          titleScore >= 0.58 ||
          finalScore >= minScore ||
          (sameSport && sameYear && titleScore >= 0.36 && fullScore >= 0.32)
        ) {
          pairs.push({ a, b, score: finalScore, titleScore, fullScore });
        }
      }
    }

    pairs.sort((x, y) => y.score - x.score);

    if (!pairs.length) {
      message.innerText = "No likely duplicates found.";
      return;
    }

    message.innerText =
      `${pairs.length} possible duplicate pair${pairs.length === 1 ? "" : "s"} found.\n\n` +
      `Use Delete for true duplicates, Mark Related for same-event/different-angle records, and Ignore for false positives.`;

    results.innerHTML = pairs.map((pair, index) => `
      <div class="card" id="pair-${index}">
        <div class="score">
          Possible duplicate score: ${Math.round(pair.score * 100)}%
          | Title: ${Math.round(pair.titleScore * 100)}%
          | Full: ${Math.round(pair.fullScore * 100)}%
        </div>

        <div class="explain">
          Decision guide:
          <strong>Delete</strong> if they are the same record.
          <strong>Mark Related</strong> if they are connected but deserve separate pages.
          <strong>Ignore</strong> if this is a false positive.
        </div>

        <div class="pair">
          ${renderMistakeBox(pair.a)}
          ${renderMistakeBox(pair.b)}
        </div>

        <div class="actions">
          <button class="related" onclick="markRelated('${pair.a.id}', '${pair.b.id}', 'pair-${index}')">
            Mark Related
          </button>

          <button class="ignore" onclick="ignorePair('${pair.a.id}', '${pair.b.id}', 'pair-${index}')">
            Ignore This Pair
          </button>
        </div>
      </div>
    `).join("");
  }

  function renderMistakeBox(m) {
    return `
      <div class="item" id="mistake-${m.id}">
        <h2>${escapeHtml(m.title || "Untitled")}</h2>
        <div class="meta">
          ${escapeHtml(m.sport || "")}
          ${m.year ? " • " + escapeHtml(m.year) : ""}
          ${m.category ? " • " + escapeHtml(m.category) : ""}
          ${m.subcategory ? " • " + escapeHtml(m.subcategory) : ""}
        </div>
        <p>${escapeHtml(m.summary || "")}</p>

        <button class="open" onclick="window.open('mistake.html?id=${m.id}', '_blank')">Open</button>
        <button class="delete" onclick="deleteMistake('${m.id}', '${escapeJs(m.title || "")}')">Delete This</button>
      </div>
    `;
  }

  async function markRelated(id1, id2, cardId) {
    const ok = confirm("Mark these as related but NOT duplicates?\n\nThey will be hidden from future duplicate scans.");
    if (!ok) return;

    const sorted = [id1, id2].sort();

    const { error } = await client
      .from("related_mistakes")
      .insert({
        mistake_id_1: sorted[0],
        mistake_id_2: sorted[1],
        relationship_type: "related"
      });

    if (error) {
      console.error(error);
      alert("Could not mark related. It may already be related.");
      return;
    }

    removeCard(cardId);
    alert("Marked as related.");
  }

  async function ignorePair(id1, id2, cardId) {
    const ok = confirm("Ignore this duplicate suggestion in future scans?");
    if (!ok) return;

    const sorted = [id1, id2].sort();

    const { error } = await client
      .from("duplicate_ignores")
      .insert({
        mistake_id_1: sorted[0],
        mistake_id_2: sorted[1]
      });

    if (error) {
      console.error(error);
      alert("Could not ignore pair. It may already be ignored.");
      return;
    }

    removeCard(cardId);
    alert("Pair ignored.");
  }

  async function deleteMistake(id, title) {
    const ok = confirm(`Delete this mistake?\n\n${title}\n\nThis cannot be undone.`);
    if (!ok) return;

    const { error } = await client
      .from("mistakes")
      .delete()
      .eq("id", id);

    if (error) {
      console.error(error);
      alert("Delete failed.");
      return;
    }

    alert("Deleted.");
    findDuplicates();
  }

  function removeCard(cardId) {
    const card = document.getElementById(cardId);
    if (card) card.remove();

    const remaining = document.querySelectorAll(".card").length;
    if (remaining === 0) {
      document.getElementById("message").innerText = "All visible duplicate suggestions reviewed.";
    }
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function escapeJs(value) {
    return String(value).replaceAll("\\", "\\\\").replaceAll("'", "\\'");
  }
  requireSportsMistakesAdminInline().then(ok => {
    if (ok) {
      document.getElementById("message").innerText = "Click scan to begin.";
      document.getElementById("scanButton").disabled = false;
    }
  });

</script>

</body>
</html>
