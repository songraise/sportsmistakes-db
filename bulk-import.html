<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bulk Import | SportsMistakes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#07111f; color:#fff; }
    .top-nav { display:flex; justify-content:space-between; align-items:center; background:#0d1b2e; border-bottom:1px solid #203852; padding:14px 20px; }
    .nav-brand { font-weight:bold; font-size:20px; color:#fff; cursor:pointer; }
    .nav-links a { color:#74b9ff; text-decoration:none; font-weight:bold; margin-left:18px; }
    .nav-links a:hover { color:#ffcc00; }
    .container { max-width:950px; margin:35px auto; padding:0 20px; }
    .card { background:#0d1b2e; border:1px solid #203852; border-radius:16px; padding:24px; }
    textarea { width:100%; min-height:330px; box-sizing:border-box; margin-top:14px; padding:14px; border-radius:10px; border:1px solid #203852; background:#07111f; color:white; font-size:14px; }
    button { margin-top:18px; padding:14px 20px; border:none; border-radius:8px; background:#1e90ff; color:white; font-weight:bold; cursor:pointer; }
    .message { margin-top:18px; color:#d8e4f2; white-space:pre-wrap; }
    .warning { color:#ffcc00; }
    .error { color:#ff8b8b; }
    code { color:#ffcc00; }
  </style>
</head>

<body>

<nav class="top-nav">
  <div class="nav-brand" onclick="window.location.href='index.html'">SportsMistakes</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="rankings.html">Rankings</a>
    <a href="submit.html">Submit</a>
  </div>
</nav>

<div class="container">
  <div class="card">
    <h1>Bulk Import Mistakes</h1>
    <p>Paste one mistake per line using this format:</p>
    <p><code>Title | Sport | Year | Category | Subcategory | Teams/People | Summary | Why It Matters | Score | Source URL</code></p>

    <textarea id="bulkText" placeholder="Example:
Seahawks Goal-Line Pass | NFL | 2015 | Coaching Mistake | Play Calling | Seattle Seahawks, New England Patriots | Seattle passed from the 1-yard line in Super Bowl XLIX and was intercepted. | One of the most debated coaching decisions in NFL history. | 95 | https://en.wikipedia.org/wiki/Super_Bowl_XLIX"></textarea>

    <button onclick="checkAndImportMistakes()">Check Duplicates & Import</button>

    <div id="message" class="message"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://scwjlljurircxuufhqih.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjd2psbGp1cmlyY3h1dWZocWloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjUyMjcsImV4cCI6MjA5Njg0MTIyN30.WF0HRRb9mAkuOySjabTd8CZXVZRqF0MhMl0N2mafnns";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function normalizeTitle(title) {
    return String(title || "")
      .toLowerCase()
      .replace(/[^a-z0-9 ]/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function getImportantWords(title) {
    const stopWords = new Set([
      "the", "a", "an", "and", "or", "of", "to", "in", "on", "for",
      "vs", "v", "game", "mistake", "error", "incident", "controversy",
      "collapse", "disaster"
    ]);

    return normalizeTitle(title)
      .split(" ")
      .filter(word => word.length > 2 && !stopWords.has(word));
  }

  function similarityScore(titleA, titleB) {
    const wordsA = getImportantWords(titleA);
    const wordsB = getImportantWords(titleB);

    if (wordsA.length === 0 || wordsB.length === 0) return 0;

    const setA = new Set(wordsA);
    const setB = new Set(wordsB);

    let matches = 0;
    setA.forEach(word => {
      if (setB.has(word)) matches++;
    });

    return matches / Math.max(setA.size, setB.size);
  }

  function parseRows(raw) {
    const lines = raw.split("\n").map(line => line.trim()).filter(Boolean);
    const rows = [];

    for (let i = 0; i < lines.length; i++) {
      const parts = lines[i].split("|").map(p => p.trim());

      if (parts.length < 10) {
        throw new Error(`Line ${i + 1} has ${parts.length} fields. It needs 10 fields separated by |`);
      }

      rows.push({
        title: parts[0],
        sport: parts[1],
        year: parts[2] ? parseInt(parts[2], 10) : null,
        category: parts[3],
        subcategory: parts[4],
        teams_people: parts[5],
        summary: parts[6],
        why_it_matters: parts[7],
        verdict_type: "Fan Verdict",
        controversy_score: parts[8] ? parseInt(parts[8], 10) : 50,
        source_1: parts[9]
      });
    }

    return rows;
  }

  async function checkAndImportMistakes() {
    const message = document.getElementById("message");
    const raw = document.getElementById("bulkText").value.trim();

    if (!raw) {
      message.innerText = "Paste at least one row first.";
      return;
    }

    let newRows;

    try {
      newRows = parseRows(raw);
    } catch (err) {
      message.innerHTML = `<span class="error">${err.message}</span>`;
      return;
    }

    message.innerText = "Checking for duplicates...";

    const { data: existing, error } = await client
      .from("mistakes")
      .select("id,title,year,sport");

    if (error) {
      console.error(error);
      message.innerHTML = `<span class="error">Could not check existing mistakes.</span>`;
      return;
    }

    const duplicateWarnings = [];

    newRows.forEach((row, index) => {
      const newTitle = normalizeTitle(row.title);

      (existing || []).forEach(old => {
        const oldTitle = normalizeTitle(old.title);
        const score = similarityScore(row.title, old.title);

        const exactMatch = newTitle === oldTitle;
        const containedMatch =
          newTitle.length > 8 &&
          oldTitle.length > 8 &&
          (newTitle.includes(oldTitle) || oldTitle.includes(newTitle));

        const sameYearSimilar =
          row.year &&
          old.year &&
          Number(row.year) === Number(old.year) &&
          score >= 0.45;

        if (exactMatch || containedMatch || sameYearSimilar || score >= 0.7) {
          duplicateWarnings.push(
            `Line ${index + 1}: "${row.title}" may duplicate existing "${old.title}" (${old.sport || ""} ${old.year || ""})`
          );
        }
      });
    });

    if (duplicateWarnings.length > 0) {
      const proceed = confirm(
        "Possible duplicates found:\n\n" +
        duplicateWarnings.slice(0, 10).join("\n") +
        (duplicateWarnings.length > 10 ? `\n\n...and ${duplicateWarnings.length - 10} more.` : "") +
        "\n\nImport anyway?"
      );

      if (!proceed) {
        message.innerHTML =
          `<span class="warning">Import cancelled. Possible duplicates:</span>\n\n` +
          duplicateWarnings.join("\n");
        return;
      }
    }

    message.innerText = `Importing ${newRows.length} mistakes...`;

    const { error: insertError } = await client
      .from("mistakes")
      .insert(newRows);

    if (insertError) {
      console.error(insertError);
      message.innerHTML = `<span class="error">Import failed. Check console for error.</span>`;
      return;
    }

    message.innerText = `Success! Imported ${newRows.length} mistakes.`;
    document.getElementById("bulkText").value = "";
  }
</script>

</body>
</html>
